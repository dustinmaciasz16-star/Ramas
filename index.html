<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guía de Comandos Git</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="text-center py-5">
        <h1>
            <i class="bi bi-git"></i>
            Diccionario Git Interactivo
        </h1>
        <p>Aprendiendo a trabajar con ramas y comandos Git</p>
    </header>

    <main class="container">
        <div class="row g-4">

            <div class="col-md-6 col-lg-4">
                <section class="card comando h-100">
                    <div class="card-body">
                        <h2 class="card-title">
                            <i class="bi bi-folder-plus"></i>
                            git init
                        </h2>
                        <p class="card-text">
                            Inicializa un nuevo repositorio local en la carpeta actual.
                        </p>
                    </div>
                </section>
            </div>

            <div class="col-md-6 col-lg-4">
                <section class="card comando h-100">
                    <div class="card-body">
                        <h2 class="card-title">
                            <i class="bi bi-cloud-download"></i>
                            git clone
                        </h2>
                        <p class="card-text">
                            Descarga una copia exacta de un repositorio remoto.
                        </p>
                    </div>
                </section>
            </div>

            <div class="col-md-6 col-lg-4">
                <section class="card comando h-100">
                    <div class="card-body">
                        <h2 class="card-title">
                            <i class="bi bi-plus-circle"></i>
                            git add
                        </h2>
                        <p class="card-text">
                            Prepara los cambios para el próximo commit.
                        </p>
                    </div>
                </section>
            </div>

        </div>
    </main>

</body>
</html>
